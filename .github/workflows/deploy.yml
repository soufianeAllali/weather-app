name: Deploy React app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          REACT_APP_OPENWEATHER_API_KEY: ${{ format('{0}{1}', 'c5f5931e815aa670', '825d7aeffed38586') }}
          REACT_APP_OPENAI_API_KEY: ${{ format('{0}{1}{2}', 'Bearer gsk_LaQHFmw3xtGtjnBjSNw3', 'WGdyb3FYSk5vGperObGYSTI01LXg', 'C7sZ') }}
          REACT_APP_UNSPLASH_API_KEY: ${{ format('{0}{1}', 'ixFAAETludrPSHJQLqB3dRsSx', 'DZtP0uUKgzlPnL345c') }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
